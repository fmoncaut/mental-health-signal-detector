services:
  - type: web
    name: mh-detector-api
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.api.slim
    dockerContext: .
    plan: free
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false   # URL Vercel du frontend
      - key: PORT
        value: "8000"
      - key: TRUST_PROXY_HEADERS
        value: "true"   # Render place un load balancer devant — X-Forwarded-For fiable
    healthCheckPath: /health
